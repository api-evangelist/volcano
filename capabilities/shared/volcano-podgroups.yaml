naftiko: "1.0.0-alpha1"

info:
  label: "Volcano PodGroup API"
  description: >-
    Kubernetes CRD API for managing Volcano PodGroup resources — the unit of
    gang scheduling in Volcano. PodGroups define a minimum pod count that must
    all be scheduled together (all-or-nothing semantics) for distributed
    computing workloads like Spark and model serving.
  tags:
    - Volcano
    - Kubernetes
    - Gang Scheduling
    - Pod Management
    - Distributed Computing
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      KUBERNETES_API_SERVER: KUBERNETES_API_SERVER
      KUBERNETES_TOKEN: KUBERNETES_TOKEN

capability:
  consumes:
    - type: http
      namespace: volcano-podgroups
      baseUri: "https://{{KUBERNETES_API_SERVER}}"
      description: "Volcano PodGroup CRD API via Kubernetes API server."
      authentication:
        type: bearer
        token: "{{KUBERNETES_TOKEN}}"
      resources:
        - name: namespaced-podgroups
          path: /apis/scheduling.volcano.sh/v1beta1/namespaces/{namespace}/podgroups
          description: "PodGroups in a namespace."
          operations:
            - name: list-namespaced-podgroups
              method: GET
              description: "List PodGroups in a namespace."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                - name: labelSelector
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-namespaced-podgroup
              method: POST
              description: "Create a PodGroup for gang scheduling."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  apiVersion: "scheduling.volcano.sh/v1beta1"
                  kind: "PodGroup"

        - name: namespaced-podgroup-detail
          path: /apis/scheduling.volcano.sh/v1beta1/namespaces/{namespace}/podgroups/{name}
          description: "Operate on a specific PodGroup."
          operations:
            - name: get-namespaced-podgroup
              method: GET
              description: "Get a specific PodGroup."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                - name: name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-namespaced-podgroup
              method: DELETE
              description: "Delete a PodGroup."
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                - name: name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: volcano-podgroups-rest
      resources:
        - path: /v1/podgroups/{namespace}
          name: podgroups
          operations:
            - method: GET
              name: list-namespaced-podgroups
              description: "List PodGroups."
              call: "volcano-podgroups.list-namespaced-podgroups"
              with:
                namespace: "rest.namespace"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-namespaced-podgroup
              description: "Create a PodGroup."
              call: "volcano-podgroups.create-namespaced-podgroup"
              with:
                namespace: "rest.namespace"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: volcano-podgroups-mcp
      transport: http
      tools:
        - name: list-volcano-podgroups
          description: "List Volcano PodGroups in a namespace."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volcano-podgroups.list-namespaced-podgroups"
          with:
            namespace: "tools.namespace"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-volcano-podgroup
          description: "Create a PodGroup for gang-scheduled distributed workloads."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "volcano-podgroups.create-namespaced-podgroup"
          with:
            namespace: "tools.namespace"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-volcano-podgroup
          description: "Get status and details for a PodGroup."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volcano-podgroups.get-namespaced-podgroup"
          with:
            namespace: "tools.namespace"
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."

naftiko: "1.0.0-alpha1"

info:
  label: "Volcano Queue API"
  description: >-
    Kubernetes CRD API for managing Volcano Queue resources. Queues define
    scheduling partitions with weight-based fair sharing, resource capacity,
    and reclaimable resource policies for multi-tenant batch workload management.
  tags:
    - Volcano
    - Kubernetes
    - Queue Management
    - Resource Management
    - Multi-Tenancy
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      KUBERNETES_API_SERVER: KUBERNETES_API_SERVER
      KUBERNETES_TOKEN: KUBERNETES_TOKEN

capability:
  consumes:
    - type: http
      namespace: volcano-queues
      baseUri: "https://{{KUBERNETES_API_SERVER}}"
      description: "Volcano Queue CRD API via Kubernetes API server."
      authentication:
        type: bearer
        token: "{{KUBERNETES_TOKEN}}"
      resources:
        - name: queues
          path: /apis/scheduling.volcano.sh/v1beta1/queues
          description: "Cluster-scoped Volcano Queue resources."
          operations:
            - name: list-queues
              method: GET
              description: "List all Volcano Queues in the cluster."
              inputParameters:
                - name: labelSelector
                  in: query
                  type: string
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-queue
              method: POST
              description: "Create a new Volcano Queue."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  apiVersion: "scheduling.volcano.sh/v1beta1"
                  kind: "Queue"

        - name: queue-detail
          path: /apis/scheduling.volcano.sh/v1beta1/queues/{name}
          description: "Operate on a specific Volcano Queue."
          operations:
            - name: get-queue
              method: GET
              description: "Get a specific Volcano Queue."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-queue
              method: PUT
              description: "Replace a Volcano Queue specification."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  apiVersion: "scheduling.volcano.sh/v1beta1"
                  kind: "Queue"

            - name: delete-queue
              method: DELETE
              description: "Delete a Volcano Queue."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: volcano-queues-rest
      resources:
        - path: /v1/queues
          name: queues
          description: "Manage Volcano Queues."
          operations:
            - method: GET
              name: list-queues
              description: "List all queues."
              call: "volcano-queues.list-queues"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-queue
              description: "Create a queue."
              call: "volcano-queues.create-queue"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/queues/{name}
          name: queue-detail
          description: "Operate on a specific queue."
          operations:
            - method: GET
              name: get-queue
              description: "Get a queue."
              call: "volcano-queues.get-queue"
              with:
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-queue
              description: "Update a queue."
              call: "volcano-queues.update-queue"
              with:
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-queue
              description: "Delete a queue."
              call: "volcano-queues.delete-queue"
              with:
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: volcano-queues-mcp
      transport: http
      tools:
        - name: list-volcano-queues
          description: "List all Volcano scheduling queues in the cluster."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volcano-queues.list-queues"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-volcano-queue
          description: "Get configuration and status of a Volcano queue."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "volcano-queues.get-queue"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-volcano-queue
          description: "Create a new Volcano scheduling queue with weight and capacity."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "volcano-queues.create-queue"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-volcano-queue
          description: "Delete a Volcano scheduling queue."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "volcano-queues.delete-queue"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."

specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Volcano
providerId: volcano
publisherName: Cloud Native Computing Foundation
serviceCategory: Open Source / Kubernetes Scheduler
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Open Source
  - Kubernetes
  - Batch Scheduling
  - HPC
  - FinOps
  - FOCUS
description: FinOps view of Volcano - the project itself has no licensing or
  invoice surface (Apache 2.0, CNCF incubating). Costs of running Volcano-
  scheduled workloads accrue at the underlying compute, GPU, network, and
  storage layers of the host Kubernetes cluster (cloud or on-prem). The
  FinOps levers are queue capacity, gang-schedule efficiency, and
  bin-packing of batch workloads onto the underlying infrastructure.
sources:
  - https://volcano.sh
  - https://volcano.sh/en/docs/
  - https://github.com/volcano-sh/volcano
notes: No publisher invoice. FOCUS records for Volcano workloads are produced
  by the underlying cloud / Kubernetes-platform billing pipeline and tagged by
  Volcano Queue / Job metadata; there is no Volcano-issued line item.
billingModel:
  pricingCategory: Open Source
  billingFrequency: Continuous Settlement
  billingCurrency: USD
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: Volcano
  ServiceCategory: Open Source / Kubernetes Scheduler
  ProviderName: Volcano
  PublisherName: Cloud Native Computing Foundation
  InvoiceIssuerName: '(none - open source)'
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: scheduled_compute_seconds
    description: Compute consumed by Volcano-scheduled pods on the underlying
      cluster, attributed via Volcano Queue and Job labels.
    unit: second
    aggregation: sum
    dimensions:
      - queue
      - job
      - namespace
      - node_pool
  - name: gpu_seconds
    description: GPU time consumed by Volcano-scheduled batch / HPC / ML
      training workloads.
    unit: second
    aggregation: sum
    dimensions:
      - queue
      - gpu_type
      - job
  - name: queue_capacity_utilization
    description: Ratio of allocated to declared Queue capability across CPU,
      memory, and GPU.
    unit: ratio
    aggregation: avg
    dimensions:
      - queue
      - resource
principles:
  - name: Visibility
    description: Volcano emits Prometheus metrics for queue allocation,
      pending pods, and job state; pair with kube-state-metrics and the
      cluster's cost-allocation tool (OpenCost, Kubecost) to attribute spend
      to Queues / Jobs.
  - name: Allocation
    description: Allocate underlying compute spend by Volcano Queue and
      Job labels - typical breakdown is per training run, team, or
      research project mapped to a Queue weight.
  - name: Optimization
    description: Tune Queue weight and capability to bin-pack batch workloads,
      use gang scheduling to avoid stranded GPU reservations, and right-size
      PodGroup minMember to reduce idle waiting.
  - name: Accountability
    description: Platform / SRE owns the Volcano scheduler configuration;
      individual Queue owners are accountable for staying within the
      declared capability and for tagging Jobs for chargeback.
maintainers:

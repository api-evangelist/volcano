specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Volcano
providerId: volcano
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Open Source
  - Kubernetes
  - Batch Scheduling
  - HPC
  - CNCF
description: Volcano is a CNCF incubating, Apache-2.0 licensed batch and HPC
  scheduler for Kubernetes. There is no commercial pricing or paid plan -
  the project is run by the community and consumed by deploying the operator
  into a customer-owned Kubernetes cluster. Costs accrue at the underlying
  Kubernetes / cloud-infrastructure layer, not as a Volcano subscription.
sources:
  - https://volcano.sh
  - https://volcano.sh/en/docs/
  - https://github.com/volcano-sh/volcano
notes: Open-source project (Apache 2.0). No vendor entity, no list price, no
  paid tier. The "plan" entry is preserved as a single open-source plan so
  consumers can iterate the structure; commercial support is available only
  through third-party Kubernetes vendors that ship Volcano in their distribution.
plans:
  - id: volcano-open-source
    name: Open Source (Apache 2.0)
    type: freemium
    description: Volcano is a CNCF incubating project distributed under the
      Apache 2.0 license. Self-host into any Kubernetes cluster; there is no
      paid subscription from the project itself.
    entries:
      - label: Software License
        name: software_license
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Apache 2.0 License
      - name: CNCF Incubating Project
      - name: Job CRD (vcjob)
      - name: Queue CRD
      - name: PodGroup CRD
      - name: Gang Scheduling
      - name: Fair-Share Scheduling
      - name: Multi-Dimensional Resource Quotas
      - name: Community Support (GitHub / Slack)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com

specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Volcano
providerId: volcano
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Open Source
  - Kubernetes
  - Rate Limiting
  - Quotas
description: Volcano does not expose a vendor-side request-rate limit. As a
  Kubernetes-native scheduler running in the customer's cluster, "limits" in
  Volcano are workload-level resource quotas - CPU, memory, GPU, and queue
  capacity - enforced via the Queue CRD and standard Kubernetes ResourceQuota
  objects. Consumers of the Volcano API interact with the Kubernetes API
  server, whose rate-limit and admission-controller behavior governs request
  throttling.
sources:
  - https://volcano.sh/en/docs/
  - https://github.com/volcano-sh/volcano
notes: No vendor SaaS endpoint exists. Request rate is governed by the
  Kubernetes API server's client-go QPS / burst settings and any admission
  controllers in the cluster. Resource fairness is enforced via Volcano Queue
  capacity and ResourceQuota at the namespace level.
limits:
  - name: Kubernetes API Server (cluster-side)
    scope: cluster
    metric: varies
    limit: see kube-apiserver --max-requests-inflight / --max-mutating-requests-inflight
    notes: Volcano is consumed via the Kubernetes API; rate enforcement is
      whatever the cluster's API server is configured with.
  - name: Volcano Queue Capacity
    scope: queue
    metric: varies
    limit: see Queue CRD spec.capability
    notes: Multi-dimensional resource cap (CPU, Memory, GPU) per Queue;
      enforced by Volcano scheduler, not as a request-rate limit.
policies:
  - name: Kubernetes-Native Throttling
    description: All client interaction is via kubectl / client-go against the
      Kubernetes API server. Use the standard client-go QPS / burst tunables
      and respect 429 responses from the API server.
  - name: Queue-Based Fairness
    description: Volcano enforces fairness through Queues with hierarchical
      resource inheritance, weight, and capability caps rather than per-second
      request limits.
  - name: Gang Scheduling Admission
    description: Jobs are admitted only when the full PodGroup can be scheduled
      atomically; partial submissions are gated by the scheduler rather than
      throttled at the API surface.
